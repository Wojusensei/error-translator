<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error Translator DA☆ZE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1e1e2e;color:#cdd6f4;min-height:100vh;display:flex;justify-content:center;padding:40px 20px}
.container{max-width:700px;width:100%}
h1{text-align:center;font-size:28px;margin-bottom:8px}
.subtitle{text-align:center;color:#a6adc8;margin-bottom:24px;font-size:14px}
textarea{width:100%;height:120px;background:#313244;border:1px solid #45475a;border-radius:8px;color:#cdd6f4;padding:14px;font-size:14px;resize:vertical;font-family:monospace}
textarea:focus{outline:none;border-color:#89b4fa}
button{display:block;margin:12px auto 0;padding:10px 28px;background:#89b4fa;color:#1e1e2e;border:none;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer}
button:hover{background:#b4d0fb}
.result{margin-top:20px;background:#313244;border-radius:8px;padding:20px;display:none}
.result.show{display:block}
.lang{font-size:16px;font-weight:600;margin-bottom:6px}
.level{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600;margin-bottom:12px}
.le{background:#f38ba8;color:#1e1e2e}
.lw{background:#f9e2af;color:#1e1e2e}
.lf{background:#eba0ac;color:#1e1e2e}
.explain{line-height:1.7;font-size:15px}
.history{margin-top:32px}
.history h3{font-size:16px;margin-bottom:10px;color:#a6adc8}
.hi{background:#313244;border-radius:6px;padding:10px 14px;margin-bottom:8px;font-size:13px;color:#bac2de}
.nm{color:#f38ba8}
</style>
</head>
<body>
<div class="container">
<h1>🔍 Error Translator</h1>
<p class="subtitle">Paste an error, get plain explanation — 一w一</p>
<textarea id="box" placeholder="Paste error message here..."></textarea>
<button id="btn">Translate DA☆ZE</button>
<div class="result" id="res"></div>
<div class="history" id="hist"></div>
</div>

<script>
(function(){
  var hlist=[];

  function doit(){
    var input=document.getElementById('box').value.trim();
    if(!input) return;

    fetch('/translate?q='+encodeURIComponent(input))
      .then(function(r){return r.json();})
      .then(function(data){
        var resEl=document.getElementById('res');
        if(data.found){
          var lv=data.level;
          var cls=(lv==='warning')?'lw':(lv==='fatal')?'lf':'le';
          var em=(lv==='warning')?'🟡':(lv==='fatal')?'💀':'🔴';
          resEl.innerHTML='<div class="lang">'+em+' '+data.lang+' — '+data.match+'</div><span class="level '+cls+'">'+lv.toUpperCase()+'</span><p class="explain">'+data.explain+'</p>';
        }else{
          resEl.innerHTML='<p class="nm">❓ No match found. Try the full error message 一w一</p>';
        }
        resEl.classList.add('show');

        hlist.unshift(input);
        if(hlist.length>10) hlist.pop();

        var histEl=document.getElementById('hist');
        var s='<h3>📋 History</h3>';
        for(var j=0;j<hlist.length;j++){s+='<div class="hi">'+hlist[j]+'</div>';}
        histEl.innerHTML=s;
      })
      .catch(function(){
        var resEl=document.getElementById('res');
        resEl.innerHTML='<p class="nm">❌ Server not running. Please start translator.exe first qwq</p>';
        resEl.classList.add('show');
      });
  }

  document.getElementById('btn').addEventListener('click', doit);
})();
</script>
</body>
</html>
